################################################################################
#                                                                              #
#           https://github.com/billmakes/bsptile/blob/main/config.toml           #
#                                                                              #
################################################################################

#################################### Tiling ####################################

# Initial tiling activation (true | false).
tiling_enabled = true

# An overlay window is displayed for this time period [ms] when the layout was changed (0 = disabled).
tiling_gui = 1500

# Menu entries in systray which shows the tiling state as icon ([] = disabled).
# tiling_icon = [
#   ["ACTION", "TEXT"] = ["action strings from [keys] section", "text to show in the menu"],
#   ["", ""] = "show a separator line",
# ]
tiling_icon = [
    ["toggle", "Enabled"],
    ["decoration", "Decoration"],
    ["", ""],
    ["reset", "Reset"],
    ["", ""],
    ["exit", "Exit"],
]

#################################### Window ####################################

# Regex RE2 syntax to ignore windows (WM_CLASS string can be found by running `xprop WM_CLASS`).
# window_ignore = [
#   ["WM_CLASS", "WM_NAME"] = ["ignore all windows with this class", "but allow those with this name"]
# ]
window_ignore = [
    ["nm.*", ""],
    ["gcr.*", ""],
    ["polkit.*", ""],
    ["wrapper.*", ""],
    ["lightdm.*", ""],
    ["blueman.*", ""],
    ["pavucontrol.*", ""],
    ["firefox.*", ".*Mozilla Firefox"],
]

# How much space should be left between windows (0 - 100).
window_gap_size = 10

# When hovered for this duration [ms] windows are focused (0 = disabled).
window_focus_delay = 0

# Move the pointer with keyboard focus, swap, and screen-move actions.
window_pointer_warp = false

# Keep dialogs and configured unmanaged/floating windows above tiled windows.
window_floating_above = true

# Initial rendering of window decorations (true | false).
window_decoration = true

################################## Proportion ##################################

# How much to increment/decrement the focused BSP split (0.0 - 1.0).
proportion_step = 0.05

# Minimum ratio allowed on either side of a BSP split (0.0 - 0.5).
proportion_min = 0.2

##################################### Edge #####################################

# Margin of the tiling area ([top, right, bottom, left]).
edge_margin = [0, 0, 0, 0]

# Margin of the tiling area on primary screen ([top, right, bottom, left]).
edge_margin_primary = [0, 0, 0, 0]

# Width and height of a hot-corner area within the edge corners (0 - 100).
edge_corner_size = 10

# Width or height of a hot-corner area within the edge centers (0 - 100).
edge_center_size = 100

# Outline thickness in pixels of the drop-target indicator shown while dragging.
drop_target_width = 4

################################################################################
[colors]                             # RGBA color values used for ui elements. #
################################################################################

# Window text color.
gui_text = [255, 255, 255, 255]

# Window background color.
gui_background = [30, 30, 40, 255]

# Inactive BSP leaf color.
gui_client_slave = [58, 58, 78, 255]

# Focused BSP leaf color.
gui_client_master = [98, 98, 128, 255]

# Outline color for the drop target shown while dragging a window onto another.
gui_drop_target = [255, 170, 60, 255]

# Fill color for the drop-target indicator (RGBA). Alpha controls opacity (0 = disabled).
# Requires a compositor (e.g., xfwm4 compositing). Set alpha 0 to disable the fill.
gui_drop_target_fill = [255, 170, 60, 0]

# Systray icon background color.
icon_background = [0, 0, 0, 0]

# Systray icon foreground color.
icon_foreground = [255, 255, 255, 255]

################################################################################
[keys]                            # Key symbols can be found by running `xev`. #
################################################################################

# Commands accept one binding or multiple bindings:
# toggle = "Control-Shift-T"
# toggle = ["Control-Shift-T", "Mod4-T"]

# Enable tiling on the current screen (Home = Fn_Left).
enable = "Control-Shift-Home"

# Disable tiling on the current screen (End = Fn_Right).
disable = "Control-Shift-End"

# Toggle between enable and disable on the current screen.
toggle = "Control-Shift-T"

# Toggle window decoration on and off on the current screen.
decoration = "Control-Shift-D"

# Disable tiling and restore windows on the current screen.
restore = "Control-Shift-R"

# Reset BSP split ratios (BackSpace = Delete_Left).
reset = "Control-Shift-BackSpace"

# Reload the configuration file and keyboard shortcuts.
reload = "Control-Shift-C"

# Enter resize mode.
mode_resize = "Mod4-Shift-r"

# Rotate the BSP tree clockwise by 90 degrees.
tree_rotate = "Mod4-r"

# Return the workspace to BSP tiling mode.
layout_bsp = "Control-Shift-B"

# Activates the maximized layout (Space = Blank).
layout_maximized = "Control-Shift-Space"

# Activates the fullscreen layout (Return = Enter).
layout_fullscreen = "Control-Shift-Return"

# Move focus to the next window (KP_2 = Num_2).
window_next = "Control-Shift-KP_2"

# Move focus to the previous window (KP_8 = Num_8).
window_previous = "Control-Shift-KP_8"

# Swap the active window with the nearest window above it.
move_window_up = ""

# Swap the active window with the nearest window below it.
move_window_down = ""

# Swap the active window with the nearest window to its left.
move_window_left = ""

# Swap the active window with the nearest window to its right.
move_window_right = ""

# Move the active window to the next position (KP_3 = Num_3).
position_next = "Control-Shift-KP_3"

# Move the active window to the previous position (KP_1 = Num_1).
position_previous = "Control-Shift-KP_1"

# Move the active window to the next screen (KP_9 = Num_9).
screen_next = "Control-Shift-KP_9"

# Move the active window to the previous screen (KP_7 = Num_7).
screen_previous = "Control-Shift-KP_7"

# Increase the BSP split containing the active window (Insert = Ins).
proportion_increase = "Control-Shift-Insert"

# Decrease the BSP split containing the active window (Delete = Del).
proportion_decrease = "Control-Shift-Delete"

# Some commands above will affect all screens if this key is pressed in addition (Mod1 = Alt_L).
mod_screens = "Mod1"

# Some commands above will affect all workspaces if this key is pressed in addition (Mod4 = Super_L).
mod_workspaces = "Mod4"

################################################################################
[mouse]                       # Global mouse button bindings for action names. #
################################################################################

# Bindings are exact and accept Button1 through Button255, depending on what
# the X11 mouse driver exposes. Modifiers may be added, for example
# "Mod4-Button8". Use `xev` to discover the number generated by each button.
#
# Plain bindings are global passive grabs, so avoid binding buttons that
# applications or the window manager still need to receive.

# Focus the next window with mouse button 8.
window_next = ""

# Focus the previous window with mouse button 9.
window_previous = ""

# Example:
# layout_maximized = "Button10"
# layout_fullscreen = "Button11"
# layout_bsp = "Button12"

################################################################################
[modes.resize]                         # Exact shortcuts active in resize mode. #
################################################################################

# Return to the default shortcut layer.
mode_default = ["Escape", "Return"]

# Move the nearest focused BSP split boundary in each direction.
proportion_left = ["Mod4-h", "Mod4-Left"]
proportion_down = ["Mod4-j", "Mod4-Down"]
proportion_up = ["Mod4-k", "Mod4-Up"]
proportion_right = ["Mod4-l", "Mod4-Right"]

################################################################################
[corners]                                # Action strings from [keys] section. #
################################################################################

# Corner at top left.
top_left = "window_previous"

# Corner at top center.
top_center = ""

# Corner at top right.
top_right = "window_next"

# Corner at center right.
center_right = ""

# Corner at bottom right.
bottom_right = "proportion_increase"

# Corner at bottom center.
bottom_center = ""

# Corner at bottom left.
bottom_left = "proportion_decrease"

# Corner at center left.
center_left = ""

################################################################################
[systray]                                # Action strings from [keys] section. #
################################################################################

# Icon left click with pointer.
click_left = ""

# Icon middle click with pointer.
click_middle = "toggle"

# Icon right click with pointer.
click_right = ""

# Icon vertical scroll up with pointer.
scroll_up = "window_previous"

# Icon vertical scroll down with pointer.
scroll_down = "window_next"

# Icon horizontal scroll left with pointer.
scroll_left = "proportion_decrease"

# Icon horizontal scroll right with pointer.
scroll_right = "proportion_increase"
