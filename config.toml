################################################################################
# bsptile configuration
#
# bsptile does not grab global keys or mouse buttons. Bind inputs in sxhkd
# or another hotkey daemon and call bsptilectl actions over the control socket.
################################################################################

#################################### Tiling ####################################

# Initial tiling activation.
tiling_enabled = true

# Layout overlay duration in milliseconds. Set 0 to disable.
tiling_gui = 1500

# Systray menu entries. ACTION is any bsptile action name.
tiling_icon = [
    ["toggle", "Enabled"],
    ["decoration", "Decoration"],
    ["", ""],
    ["reset", "Reset"],
    ["", ""],
    ["exit", "Exit"],
]

#################################### Window ####################################

# Ignore windows by [WM_CLASS regex, WM_NAME regex].
# Use `xprop WM_CLASS WM_NAME` to inspect a window.
window_ignore = [
    ["nm.*", ""],
    ["gcr.*", ""],
    ["polkit.*", ""],
    ["wrapper.*", ""],
    ["lightdm.*", ""],
    ["blueman.*", ""],
    ["pavucontrol.*", ""],
    ["firefox.*", ".*Mozilla Firefox"],
]

# Gap between tiled windows, in pixels.
window_gap_size = 4

# Hover-focus delay in milliseconds. Set 0 to disable.
window_focus_delay = 50

# Move the pointer with keyboard focus, swap, and screen-move actions.
window_pointer_warp = true

# Keep unmanaged/floating windows above tiled windows.
window_floating_above = true

# Initial decoration state for tiled windows.
window_decoration = true

################################## Proportion ##################################

# BSP split adjustment step.
proportion_step = 0.05

# Minimum ratio allowed on either side of a BSP split.
proportion_min = 0.2

##################################### Edge #####################################

# Margin around the tiling area: [top, right, bottom, left].
edge_margin = [0, 0, 0, 0]

# Margin around the primary screen tiling area.
edge_margin_primary = [0, 0, 0, 0]

# Outline width for the drag/drop target indicator.
drop_target_width = 2

################################################################################
[colors]
################################################################################

gui_text = [255, 255, 255, 255]
gui_background = [30, 30, 40, 255]
gui_client_slave = [58, 58, 78, 255]
gui_client_master = [98, 98, 128, 255]

# Drop-target outline and fill. Fill alpha 0 disables the filled rectangle.
gui_drop_target = [105, 70, 60, 255]
gui_drop_target_fill = [0, 0, 255, 255]

icon_background = [0, 0, 0, 0]
icon_foreground = [0, 0, 0, 255]

################################################################################
[systray]
################################################################################

click_left = ""
click_middle = "toggle"
click_right = ""
scroll_up = "window_previous"
scroll_down = "window_next"
scroll_left = "proportion_decrease"
scroll_right = "proportion_increase"

################################################################################
# Window rules
#
# Rules are applied in declaration order; first match wins.
# class/name are RE2 regexes matched against WM_CLASS and WM_NAME.
# monitor/desktop are 1-indexed to match the XFCE/XFWM UI.
################################################################################

# Keep xosview visible everywhere, above tiled windows, on monitor 2.
[[window_rules]]
class = "(?i)xosview"
monitor = 2
sticky = true

# Vesktop/Discord opens on monitor 2, desktop 2.
[[window_rules]]
class = "(?i)vesktop"
monitor = 2
desktop = 2

# Small utility windows float.
[[window_rules]]
class = "(?i)pavucontrol"
floating = true

[[window_rules]]
class = "(?i)blueman-manager"
floating = true

################################################################################
# Workspace rules
#
# Initial state for a workspace. Runtime toggles still win until reload/restart.
# desktop is 1-indexed; screen is optional and also 1-indexed.
################################################################################

# Keep desktop 3 untiled by default.
[[workspace_rules]]
desktop = 3
tiling = false
